<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Baby Store - Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --main: #1e293b; --accent: #f59e0b; --bg: #f8fafc; --text: #334155; 
            --card-bg: #ffffff; --border: #e2e8f0; --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --text: #f8fafc; --card-bg: #1e293b; --border: #334155; --input-bg: #334155;
        }

        body { font-family: Tahoma, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; overflow-x: hidden; }
        .header { background: var(--main); color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .nav-row { display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .search-bar { width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); outline: none; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; position: relative; border: 1px solid var(--border); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 130px; object-fit: contain; border-radius: 8px; background: #f1f5f9; }
        .discount-badge { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        
        .add-btn { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .add-btn:active { transform: scale(0.95); }
        .add-btn.action { background: var(--accent); color: #0f172a; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 16px; width: 90%; max-width: 420px; color: var(--text); max-height: 85vh; overflow-y: auto; position: relative; }

        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-section { border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; background: var(--card-bg); }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); box-sizing: border-box; font-family: inherit; }
        
        .chat-box { height: 250px; overflow-y: auto; border: 1px solid var(--border); background: var(--bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; }
        .msg.admin { background: var(--main); color: white; align-self: flex-start; }
        .msg.user { background: #e2e8f0; color: #000; align-self: flex-end; }

        .receipt-box { background: white; color: black; padding: 20px; border: 2px dashed #334155; border-radius: 10px; text-align: center; font-size: 14px; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--main); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 9999; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-row">
        <button onclick="openModal('menu-modal')" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">☰</button>
        <div class="logo-container" onclick="adminLogic()">
            <img src="https://i.postimg.cc/RWNMnJDG/image.jpg" class="logo">
            <h2 style="margin:0; font-size: 18px;">VIP Baby</h2>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div onclick="toggleTheme()" id="themeToggleBtn" style="cursor:pointer; font-size: 20px;">🌙</div>
            <div onclick="openModal('chat-modal')" style="cursor:pointer; font-size: 22px;">💬</div>
            <div onclick="openModal('cart-modal')" style="cursor:pointer; font-size: 22px; position:relative;">
                🛒 <span id="cart-count" style="position:absolute; top:-8px; right:-10px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
            </div>
        </div>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="گەڕان بۆ بەرهەمەکان..." onkeyup="filterProds()">
</div>

<div id="products-container" class="product-grid"></div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0;">بەڕێوەبردنی فرۆشگا 🛠️</h3>
        <button onclick="closeAdmin()" style="background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">دەرچوون</button>
    </div>
    
    <div class="admin-section">
        <h4>🎨 گۆڕینی ڕەنگەکان:</h4>
        <input type="color" id="mainColor" onchange="updateColors()" style="height:50px;">
        <p style="font-size:12px;">ڕەنگی سەرەکی بگۆڕە</p>
    </div>

    <div class="admin-section">
        <h4>📦 زیادکردنی بەرهەم:</h4>
        <input id="pName" placeholder="ناوی بەرهەم">
        <input id="pPrice" type="number" placeholder="نرخی کۆتایی">
        <input id="pOldPrice" type="number" placeholder="نرخی پێشوو (بۆ داشکاندن)">
        <input id="pImage" placeholder="لینکی وێنە">
        <button onclick="saveProduct()" class="add-btn" style="background:#16a34a;">بڵاوکردنەوە</button>
    </div>

    <div class="admin-section">
        <h4>💬 چاتی کڕیاران:</h4>
        <div id="admin-chats" class="chat-box" style="height:200px;"></div>
        <input id="adminReply" placeholder="وەڵام بنووسە...">
        <button onclick="sendAdminReply()" class="add-btn">ناردن</button>
    </div>

    <div class="admin-section">
        <h4>🗑️ سڕینەوەی بەرهەمەکان:</h4>
        <div id="admin-list"></div>
    </div>
</div>

<div id="cart-modal" class="modal"><div class="modal-content">
    <h3 style="margin-top:0;">🛒 سەبەتەی کڕین</h3>
    <div id="cart-items" style="margin-bottom:15px;"></div>
    <div style="border-top:1px solid var(--border); padding-top:10px; font-weight:bold;">
        کۆی گشتی: <span id="cart-total">0</span> IQD
    </div>
    <button onclick="openCheckout()" class="add-btn action">تەواوکردنی داواکاری</button>
    <button onclick="closeModal('cart-modal')" class="add-btn" style="background:#ef4444; margin-top:10px;">داخستن</button>
</div></div>

<div id="checkout-modal" class="modal"><div class="modal-content">
    <h3>📝 زانیاری گەیاندن</h3>
    <input id="cName" placeholder="ناوی سیانی">
    <input id="cPhone" placeholder="ژمارەی مۆبایل">
    <select id="cCity" onchange="updateCartUI()">
        <option value="">شار هەڵبژێرە...</option>
        <option value="سلێمانی">سلێمانی (3,000 د.ع)</option>
        <option value="هەولێر">هەولێر (5,000 د.ع)</option>
        <option value="دهۆک">دهۆک (5,000 د.ع)</option>
        <option value="کەرکوک">کەرکوک (5,000 د.ع)</option>
    </select>
    <button onclick="submitOrder()" class="add-btn action">ناردن بۆ واتسئەپ ✅</button>
</div></div>

<div id="chat-modal" class="modal"><div class="modal-content">
    <h3 style="margin-top:0;">💬 خزمەتگوزاری کڕیاران</h3>
    <div id="user-chat" class="chat-box"></div>
    <input id="userMsg" placeholder="چی دەپرسی؟">
    <button onclick="sendUserMsg()" class="add-btn action">ناردن</button>
    <button onclick="closeModal('chat-modal')" class="add-btn" style="background:#ef4444; margin-top:10px;">داخستن</button>
</div></div>

<div id="receipt-modal" class="modal"><div class="modal-content">
    <div id="receipt-content" class="receipt-box"></div>
    <button onclick="closeModal('receipt-modal')" class="add-btn">باشە</button>
</div></div>

<div id="admin-login-modal" class="modal"><div class="modal-content">
    <h3 style="text-align:center;">🔒 تەنها ئادمین</h3>
    <input type="password" id="adminPass" placeholder="پاسۆرد بنووسە">
    <button onclick="verifyAdmin()" class="add-btn">چوونەژوورەوە</button>
</div></div>

<div id="toast"></div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyAORjxXlNH2pSgBZB9DoDiArExjMXaEKro",
        authDomain: "vip-baby-nutrition.firebaseapp.com",
        databaseURL: "https://vip-baby-nutrition-default-rtdb.firebaseio.com",
        projectId: "vip-baby-nutrition",
        storageBucket: "vip-baby-nutrition.firebasestorage.app",
        messagingSenderId: "128009678284",
        appId: "1:128009678284:web:6a4bb69906ec69a90dc169"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allProds = [];
    let cart = [];
    let userId = localStorage.getItem('store_user_id') || 'U' + Math.floor(Math.random()*10000);
    localStorage.setItem('store_user_id', userId);

    // --- Load Products ---
    function loadProducts() {
        db.ref('products').on('value', (s) => {
            const data = s.val();
            allProds = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
            render();
        });
    }

    function render() {
        const container = document.getElementById('products-container');
        const adminList = document.getElementById('admin-list');
        container.innerHTML = '';
        adminList.innerHTML = '';

        allProds.forEach(p => {
            let discount = p.oldPrice ? Math.round(((p.oldPrice - p.price) / p.oldPrice) * 100) : 0;
            container.innerHTML += `
                <div class="card">
                    ${discount > 0 ? `<div class="discount-badge">${discount}% داشکاندن</div>` : ''}
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150'">
                    <h4>${p.name}</h4>
                    <div style="color:#16a34a; font-weight:bold;">${parseInt(p.price).toLocaleString()} IQD</div>
                    ${p.oldPrice ? `<div style="text-decoration:line-through; font-size:12px; color:#94a3b8;">${parseInt(p.oldPrice).toLocaleString()} IQD</div>` : ''}
                    <button class="add-btn" onclick="addToCart('${p.id}')">🛒 کڕین</button>
                </div>
            `;
            adminList.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border);">
                    <span>${p.name}</span>
                    <button onclick="deleteProd('${p.id}')" style="color:red; background:none; border:none; cursor:pointer;">سڕینەوە</button>
                </div>
            `;
        });
    }

    // --- Cart Functions ---
    function addToCart(id) {
        const p = allProds.find(x => x.id === id);
        cart.push(p);
        updateCartUI();
        showToast("زیادکرا بۆ سەبەتە ✅");
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items');
        let subtotal = 0;
        list.innerHTML = cart.map((item, i) => {
            subtotal += parseInt(item.price);
            return `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>${item.name}</span>
                <b>${parseInt(item.price).toLocaleString()}</b>
                <button onclick="removeCart(${i})" style="color:red; border:none; background:none;">✖</button>
            </div>`;
        }).join('');

        const city = document.getElementById('cCity').value;
        let delivery = (city === "سلێمانی") ? 3000 : (city === "" ? 0 : 5000);
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-total').innerText = (subtotal + delivery).toLocaleString();
    }

    function removeCart(i) { cart.splice(i, 1); updateCartUI(); }

    function openCheckout() { 
        if(cart.length === 0) return showToast("سەبەتە خاڵییە!"); 
        openModal('checkout-modal'); 
    }

    function submitOrder() {
        const n = document.getElementById('cName').value;
        const p = document.getElementById('cPhone').value;
        const c = document.getElementById('cCity').value;
        if(!n || !p || !c) return showToast("زانیارییەکان تەواو بکە");

        let msg = `داواکاری نوێ 👶%0Aناو: ${n}%0Aمۆبایل: ${p}%0Aشار: ${c}%0A---%0A`;
        cart.forEach(item => msg += `- ${item.name} (${item.price})%0A`);
        msg += `---%0Aکۆی گشتی: ${document.getElementById('cart-total').innerText} IQD`;

        window.open(`https://wa.me/9647500000000?text=${msg}`); // لێرە ژمارەی خۆت دابنێ
        showReceipt(n, c, document.getElementById('cart-total').innerText);
        cart = []; updateCartUI(); closeModal('checkout-modal'); closeModal('cart-modal');
    }

    function showReceipt(n, c, t) {
        document.getElementById('receipt-content').innerHTML = `
            <h2 style="color:#16a34a;">سەرکەوتوو بوو ✅</h2>
            <p>بەڕێز: ${n}</p>
            <p>بۆ شاری: ${c}</p>
            <p style="font-size:18px; font-weight:bold;">کۆی گشتی: ${t} IQD</p>
            <p>سکرین شۆتی ئەم وەسڵە بگرە</p>
        `;
        openModal('receipt-modal');
    }

    // --- Admin Logic ---
    function saveProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const oldPrice = document.getElementById('pOldPrice').value;
        const image = document.getElementById('pImage').value;
        if(name && price && image) {
            db.ref('products').push({name, price, oldPrice, image}).then(() => {
                showToast("بەرهەمەکە بڵاوکرایەوە");
                document.querySelectorAll('#admin-panel input').forEach(i => i.value = '');
            });
        }
    }

    function deleteProd(id) { if(confirm("دڵنیای؟")) db.ref('products/'+id).remove(); }

    let count = 0;
    function adminLogic() {
        count++;
        if(count >= 3) { openModal('admin-login-modal'); count = 0; }
        setTimeout(() => count = 0, 2000);
    }

    function verifyAdmin() {
        if(document.getElementById('adminPass').value === "20242024") {
            closeModal('admin-login-modal');
            document.getElementById('admin-panel').style.display = 'block';
            loadAdminChats();
        } else showToast("پاسۆرد هەڵەیە!");
    }

    // --- Chat System ---
    function sendUserMsg() {
        const m = document.getElementById('userMsg').value;
        if(m) {
            db.ref('chats/'+userId).push({sender:'user', text:m});
            document.getElementById('userMsg').value = '';
        }
    }

    function loadUserChats() {
        db.ref('chats/'+userId).on('value', s => {
            const data = s.val();
            const box = document.getElementById('user-chat');
            box.innerHTML = data ? Object.values(data).map(m => `<div class="msg ${m.sender}">${m.text}</div>`).join('') : '';
            box.scrollTop = box.scrollHeight;
        });
    }

    function loadAdminChats() {
        db.ref('chats').on('value', s => {
            const data = s.val();
            const box = document.getElementById('admin-chats');
            box.innerHTML = '';
            if(data) {
                Object.keys(data).forEach(u => {
                    const lastMsg = Object.values(data[u]).pop();
                    box.innerHTML += `<div onclick="setActiveChat('${u}')" style="cursor:pointer; padding:10px; border-bottom:1px solid #eee;">
                        <b>کڕیار ${u}:</b> ${lastMsg.text}
                    </div>`;
                });
            }
        });
    }

    // --- General ---
    function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id==='chat-modal') loadUserChats(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.className='show'; setTimeout(()=>t.className='',3000); }
    
    function toggleTheme() {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        document.getElementById('themeToggleBtn').innerText = next === 'dark' ? '☀️' : '🌙';
    }

    function filterProds() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('products-container');
        const filtered = allProds.filter(p => p.name.toLowerCase().includes(term));
        renderFiltered(filtered);
    }

    function renderFiltered(prods) {
        const container = document.getElementById('products-container');
        container.innerHTML = prods.map(p => `
            <div class="card">
                <img src="${p.image}">
                <h4>${p.name}</h4>
                <div style="color:#16a34a; font-weight:bold;">${parseInt(p.price).toLocaleString()} IQD</div>
                <button class="add-btn" onclick="addToCart('${p.id}')">🛒 کڕین</button>
            </div>
        `).join('');
    }

    loadProducts();
</script>
</body>
</html>
