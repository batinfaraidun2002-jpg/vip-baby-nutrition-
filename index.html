<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Baby Pro Max</title>
<style>
:root { --main:#1e293b; --accent:#f59e0b; --bg:#f8fafc; --text:#334155; --card-bg:#fff; }
.dark-mode { --main:#0f172a; --bg:#1e293b; --text:#f8fafc; --card-bg:#334155; }

body{font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding-bottom:80px;transition:.3s;overflow-x:hidden;}
.header{background:var(--main);color:#fff;padding:18px;position:sticky;top:0;z-index:1000;box-shadow:0 5px 15px rgba(0,0,0,.2);border-bottom:4px solid var(--accent);}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{width:55px;height:55px;border-radius:50%;border:2px solid #fff;cursor:pointer;object-fit:cover;box-shadow:0 0 15px rgba(255,255,255,.3);}
.search-bar{width:100%;padding:15px;border-radius:15px;border:2px solid transparent;outline:none;font-size:15px;box-sizing:border-box;transition:.3s;}
.search-bar:focus{border-color:var(--accent);background:#fff;}
.slider-container{position:relative;width:100%;height:230px;overflow:hidden;background:#eee;border-bottom:2px solid #ddd;}
.slider{display:flex;transition:transform .7s cubic-bezier(.4,0,.2,1);height:100%;width:100%;}
.slider img{min-width:100%;height:100%;object-fit:cover;}
.slider-dots{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:8px;}
.dot{width:12px;height:12px;background:rgba(255,255,255,.5);border-radius:50%;cursor:pointer;transition:.3s;}
.dot.active{background:var(--accent);width:30px;border-radius:15px;}
.section-header{padding:20px 15px 10px;font-weight:bold;font-size:19px;display:flex;align-items:center;gap:10px;}
.best-seller-row{overflow-x:auto;display:flex;gap:15px;padding:10px 15px;scrollbar-width:none;}
.best-seller-row::-webkit-scrollbar{display:none;}
.best-card{min-width:165px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;padding:22px;border-radius:25px;text-align:center;box-shadow:0 10px 20px rgba(245,158,11,.4);font-weight:bold;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;padding:15px;}
.card{background:var(--card-bg);border-radius:28px;padding:18px;box-shadow:0 8px 20px rgba(0,0,0,.07);text-align:center;position:relative;border:1px solid rgba(0,0,0,.03);transition:.4s ease;}
.card img{width:100%;height:160px;object-fit:contain;border-radius:20px;margin-bottom:15px;}
.age-badge{background:var(--main);color:white;font-size:12px;padding:5px 15px;border-radius:25px;position:absolute;top:15px;left:15px;z-index:10;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,.3);}
.stock-tag{color:#ef4444;font-size:12px;font-weight:bold;background:#fee2e2;padding:4px 12px;border-radius:10px;display:inline-block;margin:8px 0;border:1px solid rgba(239,68,68,.1);}
.color-dot{width:28px;height:28px;border-radius:50%;display:inline-block;margin:5px;border:2px solid #ddd;cursor:pointer;transition:.3s;}
.size-btn{padding:8px 16px;border:1.5px solid #d1d5db;border-radius:14px;font-size:13px;cursor:pointer;background:white;color:var(--text);margin:4px;display:inline-block;font-weight:bold;transition:.3s;}
.selected-opt{border-color:var(--accent)!important;transform:scale(1.25);box-shadow:0 0 15px var(--accent);}
.selected-size{background:var(--accent);color:white;border-color:var(--accent);}
.add-btn{background:var(--main);color:white;border:none;padding:16px;border-radius:20px;width:100%;font-weight:bold;cursor:pointer;margin-top:15px;font-size:15px;transition:.3s;}
.float-wa{position:fixed;bottom:30px;right:30px;background:#25d366;color:white;width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 10px 30px rgba(37,211,102,.5);z-index:4000;text-decoration:none;animation:pulse 2s infinite;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:5000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.modal-content{background:var(--bg);color:var(--text);padding:40px;border-radius:40px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 30px 60px rgba(0,0,0,.4);}
input,select,textarea{width:100%;padding:18px;margin-bottom:18px;border:1px solid #e2e8f0;border-radius:18px;font-family:inherit;font-size:16px;outline:none;box-sizing:border-box;}
.admin-item{display:flex;align-items:center;justify-content:space-between;background:white;padding:18px;margin-bottom:15px;border-radius:20px;border:1px solid #eee;color:#000;box-shadow:0 4px 10px rgba(0,0,0,.03);}
.del-btn{background:#ef4444;color:white;border:none;padding:12px 22px;border-radius:15px;cursor:pointer;font-weight:bold;}
</style>
</head>
<body>

<div class="header">
  <div class="nav-row">
    <button onclick="toggleMode()" style="background:rgba(255,255,255,.2);border:none;color:white;border-radius:15px;padding:12px 20px;cursor:pointer;font-weight:bold;">🌓</button>
    <div style="display:flex;align-items:center;gap:15px;cursor:pointer;" onclick="goAdminLogin()">
      <img src="https://i.postimg.cc/RWNMnJDG/image.jpg" class="logo">
      <h2 style="margin:0;font-size:24px;">VIP Baby</h2>
    </div>
    <div onclick="openModal('cart-modal')" style="cursor:pointer;font-size:32px;position:relative;">
      🛒 <span id="cart-count" style="position:absolute;top:-12px;right:-12px;background:#ef4444;color:white;border-radius:50%;width:25px;height:25px;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid var(--main);">0</span>
    </div>
  </div>
  <input type="text" id="searchInput" class="search-bar" placeholder="بگەڕێ..." onkeyup="filterProds()">
</div>

<div class="slider-container" id="slider-box">
  <div class="slider" id="slider"></div>
  <div class="slider-dots" id="dots"></div>
</div>

<div class="section-header">🔥 پڕفرۆشترینەکان</div>
<div class="best-seller-row" id="best-sellers">
  <div class="best-card">مۆدێلی جەژن 👗</div>
  <div class="best-card">پێڵاوی نوێ 👟</div>
  <div class="best-card">یاری منداڵان 🧸</div>
  <div class="best-card">دیاری تایبەت 🎁</div>
</div>

<div class="section-header">📦 هەموو بەرهەمەکان</div>
<div id="products-container" class="product-grid"></div>

<a id="wa-link" href="#" class="float-wa" target="_blank">💬</a>

<!-- Modals -->
<div id="cart-modal" class="modal">
<div class="modal-content">
<h3>🛒 سەبەتەی کڕین</h3>
<div id="cart-items" style="margin-bottom:25px;"></div>
<button onclick="openCheckout()" class="add-btn">تەواوکردنی کڕین</button>
<button onclick="closeModal('cart-modal')" style="width:100%;border:none;background:none;color:gray;margin-top:20px;cursor:pointer;">داخستن</button>
</div>
</div>

<div id="checkout-modal" class="modal">
<div class="modal-content">
<h3>📋 زانیاری گەیاندن</h3>
<input type="text" id="cName" placeholder="ناوی تەواو">
<input type="tel" id="cPhone" placeholder="ژمارەی مۆبایل">
<select id="cCity" onchange="updateCheckoutTotal()">
<option value="0">شار هەڵبژێرە...</option>
<option value="3000">سلێمانی (+3,000)</option>
<option value="5000">هەولێر (+5,000)</option>
<option value="5000">شارەکانی تر (+5,000)</option>
</select>
<input type="text" id="cDistrict" placeholder="ناونیشانی ورد">
<div style="background:rgba(22,163,74,.1);padding:25px;border-radius:25px;margin-bottom:25px;border:1px solid rgba(22,163,74,.2);">
<div style="display:flex;justify-content:space-between;font-weight:bold;color:#16a34a;font-size:22px;">
<span>کۆی گشتی:</span><span><span id="final-total">0</span> IQD</span>
</div></div>
<button onclick="submitOrder()" class="add-btn" style="background:#16a34a;">ناردن بۆ وەتسئەپ</button>
<button onclick="closeModal('checkout-modal')" style="width:100%;border:none;background:none;color:red;margin-top:15px;cursor:pointer;">پاشگەزبوونەوە</button>
</div>
</div>

<div id="admin-login-modal" class="modal">
<div class="modal-content">
<h3>🔐 Admin Login</h3>
<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="adminLogin()">Login</button>
<button onclick="closeModal('admin-login-modal')" style="width:100%;border:none;background:none;color:red;margin-top:10px;">داخستن</button>
</div>
</div>

<div id="admin-panel" class="modal">
<div class="modal-content">
<h3>بەڕێوەبردن 🛠️</h3>
<h4>➕ زیادکردنی بەرهەم</h4>
<input id="pName" placeholder="ناوی مۆدێل">
<input id="pPrice" placeholder="نرخ">
<input id="pAge" placeholder="تەمەن">
<input id="pStock" placeholder="ستۆک">
<input id="pColors" placeholder="ڕەنگەکان (کۆما بەکارهێنە)">
<input id="pSizes" placeholder="قەبارەکان (کۆما) ">
<input id="pImage" placeholder="لینکی وێنە">
<button onclick="saveProduct()" class="add-btn">بڵاوکردنەوە</button>
<h4>🖼️ وێنەی سلایدەر</h4>
<input id="slideImage" placeholder="لینکی وێنەی نوێ">
<button onclick="addSlide()" class="add-btn" style="background:green;">زیادکردنی وێنە</button>
<h4>📦 لیستی سڕینەوە</h4>
<div id="admin-product-list"></div>
<button onclick="closeModal('admin-panel')" class="add-btn" style="background:red;margin-top:20px;">داخستن</button>
</div>
</div>

<div id="toast" style="visibility:hidden;min-width:280px;background:#333;color:#fff;text-align:center;border-radius:20px;padding:20px;position:fixed;bottom:110px;left:50%;transform:translateX(-50%);z-index:10000;font-weight:bold;"></div>

<script>
let allProds = JSON.parse(localStorage.getItem('products'))||[];
let slides = JSON.parse(localStorage.getItem('slides'))||["https://via.placeholder.com/800x400?text=VIP+Baby"];
let cart=[]; let selections={}; let currentSlide=0;
let storeWa="9647700000000"; // Default WA number
let adminCreds=JSON.parse(localStorage.getItem('adminCreds'))||{user:"admin",pass:"2024"};

function toggleMode(){document.body.classList.toggle('dark-mode');}
function showToast(msg){let t=document.getElementById('toast');t.innerText=msg;t.style.visibility='visible';setTimeout(()=>t.style.visibility='hidden',2500);}
function openModal(id){document.getElementById(id).style.display='flex';if(id==='admin-panel')renderAdminList();}
function closeModal(id){document.getElementById(id).style.display='none';}
function goAdminLogin(){openModal('admin-login-modal');}

// Admin login
function adminLogin(){
let u=document.getElementById('adminUser').value;
let p=document.getElementById('adminPass').value;
if(u===adminCreds.user && p===adminCreds.pass){closeModal('admin-login-modal');openModal('admin-panel');} else {alert("هەڵە");}
}

// Slider
function renderSlider(){
const s=document.getElementById('slider');
const d=document.getElementById('dots');
s.innerHTML=slides.map(img=>`<img src="${img}">`).join('');
d.innerHTML=slides.map((_,i)=>`<div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');
}
function goToSlide(n){currentSlide=n;document.getElementById('slider').style.transform=`translateX(${n*100}%)`;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===n));}
setInterval(()=>{if(slides.length>1){currentSlide=(currentSlide+1)%slides.length;goToSlide(currentSlide);}},5000);
function addSlide(){let url=document.getElementById('slideImage').value;if(url){slides.push(url);localStorage.setItem('slides',JSON.stringify(slides));renderSlider();showToast("وێنە زیادکرا");document.getElementById('slideImage').value='';}}

// Products
function saveProduct(){let n=document.getElementById('pName').value,p=document.getElementById('pPrice').value,st=document.getElementById('pStock').value,age=document.getElementById('pAge').value,img=document.getElementById('pImage').value,clr=document.getElementById('pColors').value,sz=document.getElementById('pSizes').value;if(!n||!p)return alert("ناو و نرخ پڕبکەرەوە");allProds.push({id:Date.now(),name:n,price:parseInt(p),stock:st,age,colors:clr?clr.split(','):[],sizes:sz?sz.split(','):[],image:img||'https://via.placeholder.com/150'});localStorage.setItem('products',JSON.stringify(allProds));renderProducts(allProds);renderAdminList();showToast("بڵاوکرایەوە ✅");["pName","pPrice","pStock","pAge","pColors","pSizes","pImage"].forEach(id=>document.getElementById(id).value='');}
function deleteProduct(id){if(confirm("دڵنیای لە سڕینەوە؟")){allProds=allProds.filter(p=>p.id!==id);localStorage.setItem('products',JSON.stringify(allProds));renderProducts(allProds);renderAdminList();}}
function renderAdminList(){document.getElementById('admin-product-list').innerHTML=allProds.map(p=>`<div class="admin-item"><span>${p.name}</span><button class="del-btn" onclick="deleteProduct(${p.id})">سڕینەوە</button></div>`).reverse().join('');}
function renderProducts(prods){document.getElementById('products-container').innerHTML=prods.map((p,idx)=>`<div class="card">${p.age?`<div class="age-badge">${p.age}</div>`:''}<img src="${p.image}"><h4 style="margin:10px 0;">${p.name}</h4>${p.stock?`<div class="stock-tag">${p.stock}</div>`:''}<div style="margin:15px 0;">${p.colors.map(c=>`<span class="color-dot" style="background:${getColor(c.trim())}" onclick="selectOpt(${idx},'color','${
