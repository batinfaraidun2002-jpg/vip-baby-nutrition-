<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Baby Nutrition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .admin-btn { background: #f39c12; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; padding-bottom: 15px; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: contain; background: #fff; }
        .price { color: #27ae60; font-weight: bold; font-size: 1.2rem; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 10px; cursor: pointer; display: none; }
        .admin-mode .delete-btn { display: inline-block; }
        #admin-panel { display: none; background: white; padding: 20px; margin: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <button class="admin-btn" onclick="toggleAdmin()">بەڕێوەبەر</button>
    <h2>VIP Baby Store</h2>
    <div style="width: 80px;"></div>
</header>

<div id="admin-panel">
    <h3>زیادکردنی کاڵای نوێ</h3>
    <input type="text" id="p-name" placeholder="ناوی کاڵا">
    <input type="number" id="p-price" placeholder="نرخ بە دینار">
    <input type="text" id="p-img" placeholder="لینکی وێنە (Direct Link)">
    <button onclick="addProduct()" style="background: #27ae60; color: white; padding: 10px 20px; border: none; border-radius: 5px; width: 100%;">بڵاوکردنەوە</button>
</div>

<div class="container" id="product-list">
    </div>

<script>
    // لێرە زانیارییەکانی خۆت دابنێوە (Config)
    const firebaseConfig = {
        apiKey: "خۆت لێرە دایبنێوە",
        authDomain: "vip-baby-nutrition.firebaseapp.com",
        projectId: "vip-baby-nutrition",
        storageBucket: "vip-baby-nutrition.appspot.com",
        messagingSenderId: "774900889280",
        appId: "1:774900889280:web:4860647c458a18353381e4"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let isAdmin = false;

    function toggleAdmin() {
        const pass = prompt("کۆدی نهێنی بنووسە:");
        if (pass === "1234") {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            document.body.classList.add('admin-mode');
            renderProducts();
        } else {
            alert("کۆدەکە هەڵەیە!");
        }
    }

    async function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;

        if(name && price && img) {
            await db.collection("products").add({ name, price, img, date: new Date() });
            alert("کاڵاکە زیادکرا!");
            location.reload();
        }
    }

    async function deleteProduct(id) {
        if(confirm("دڵنیای لە سڕینەوە؟")) {
            await db.collection("products").doc(id).delete();
            renderProducts();
        }
    }

    function renderProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = '';
        db.collection("products").orderBy("date", "desc").onSnapshot((snapshot) => {
            list.innerHTML = '';
            snapshot.forEach((doc) => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price} IQD</p>
                        <button class="delete-btn" onclick="deleteProduct('${doc.id}')">سڕینەوە 🗑️</button>
                    </div>
                `;
            });
        });
    }

    renderProducts();
</script>
</body>
</html>
