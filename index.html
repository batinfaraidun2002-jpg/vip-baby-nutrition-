<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Baby Store - Full & Professional</title>
    <style>
        :root { --main: #1e293b; --accent: #f59e0b; --bg: #f8fafc; --text: #334155; --card-bg: #ffffff; }
        .dark-mode { --main: #0f172a; --bg: #1e293b; --text: #f8fafc; --card-bg: #334155; }
        
        body { font-family: Tahoma, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; transition: 0.3s; overflow-x: hidden; }
        .header { background: var(--main); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; cursor: pointer; object-fit: cover; }
        .search-bar { width: 100%; padding: 12px; border-radius: 10px; border: none; outline: none; font-size: 14px; box-sizing: border-box; }

        /* --- SLIDER --- */
        .slider-container { position: relative; width: 100%; height: 200px; overflow: hidden; background: #eee; margin-bottom: 10px; }
        .slider { display: flex; transition: transform 0.5s ease-in-out; height: 100%; width: 100%; }
        .slider img { min-width: 100%; height: 100%; object-fit: cover; }
        .slider-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; }
        .dot.active { background: white; width: 18px; border-radius: 10px; }

        /* --- BEST SELLERS --- */
        .section-title { padding: 0 15px; margin: 15px 0 5px; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .best-seller-row { overflow-x: auto; display: flex; gap: 12px; padding: 10px 15px; scrollbar-width: none; }
        .best-seller-row::-webkit-scrollbar { display: none; }
        .best-card { min-width: 140px; background: linear-gradient(45deg, #f59e0b, #fbbf24); color: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(245,158,11,0.3); font-weight: bold; }

        /* --- PRODUCT GRID --- */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; position: relative; border: 1px solid #e2e8f0; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 130px; object-fit: contain; border-radius: 12px; margin-bottom: 10px; }
        
        .age-badge { background: var(--main); color: white; font-size: 10px; padding: 3px 10px; border-radius: 20px; position: absolute; top: 12px; left: 12px; z-index: 10; }
        .stock-tag { background: #fee2e2; color: #ef4444; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 5px; display: inline-block; margin: 5px 0; }
        .promo-timer { font-size: 10px; color: #ef4444; font-weight: bold; margin-bottom: 5px; display: block; }
        
        .color-dot { width: 22px; height: 22px; border-radius: 50%; display: inline-block; margin: 2px; border: 2px solid #ddd; cursor: pointer; transition: 0.2s; }
        .size-btn { padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 11px; cursor: pointer; background: white; color: var(--text); margin: 2px; transition: 0.2s; }
        .selected-opt { border: 2px solid var(--accent) !important; transform: scale(1.2); box-shadow: 0 0 8px var(--accent); }
        .selected-size { background: var(--accent); color: white; border-color: var(--accent); }

        .add-btn { background: var(--main); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 14px; }
        .float-wa { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 20px rgba(37,211,102,0.4); z-index: 4000; text-decoration: none; }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: var(--bg); color: var(--text); padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; position: relative; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 12px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
        
        .admin-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; color: #000; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .del-btn { background: #ef4444; color: white; border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-row">
        <button onclick="toggleMode()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; border-radius:12px; padding:6px 12px; font-size:12px; cursor:pointer;">🌓 دۆخی شەو</button>
        <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="adminLogic()">
            <img src="https://i.postimg.cc/RWNMnJDG/image.jpg" class="logo">
            <h2 style="margin:0; font-size: 19px; letter-spacing: 0.5px;">VIP Baby</h2>
        </div>
        <div onclick="openModal('cart-modal')" style="cursor:pointer; font-size: 24px; position:relative;">
            🛒 <span id="cart-count" style="position:absolute; top:-8px; right:-8px; background:#ef4444; color:white; border-radius:50%; width:20px; height:20px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
        </div>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="گەڕان بۆ تەمەن، ناو، قەبارە..." onkeyup="filterProds()">
</div>

<div class="slider-container" id="slider-box">
    <div class="slider" id="slider"></div>
    <div class="slider-dots" id="dots"></div>
</div>

<div class="section-title">🔥 پڕفرۆشترینەکانی هەفتە</div>
<div class="best-seller-row" id="best-sellers">
    <div class="best-card">جلی جەژنی نوێ 👗</div>
    <div class="best-card">پێڵاوی مارکە 👟</div>
    <div class="best-card">یاری منداڵان 🧸</div>
    <div class="best-card">عەزی ناسک 🌸</div>
</div>

<div class="section-title">📦 هەموو بەرهەمەکان</div>
<div id="products-container" class="product-grid"></div>

<a id="wa-link" href="#" class="float-wa" target="_blank">💬</a>

<div id="cart-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">🛒 سەبەتەی کڕین</h3>
        <div id="cart-items" style="margin-bottom:20px;"></div>
        <button onclick="openCheckout()" class="add-btn">تەواوکردنی داواکاری</button>
        <button onclick="closeModal('cart-modal')" style="width:100%; border:none; background:none; color:gray; margin-top:10px; cursor:pointer;">پاشگەزبوونەوە</button>
    </div>
</div>

<div id="checkout-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">📋 زانیاری گەیاندن</h3>
        <input type="text" id="cName" placeholder="ناوی سیانی">
        <input type="tel" id="cPhone" placeholder="ژمارەی مۆبایل">
        <select id="cCity" onchange="updateCheckoutTotal()">
            <option value="0">شار هەڵبژێرە...</option>
            <option value="3000">سلێمانی (+3,000)</option>
            <option value="5000">هەولێر (+5,000)</option>
            <option value="5000">دهۆک (+5,000)</option>
            <option value="5000">کەرکوک (+5,000)</option>
            <option value="5000">شارەکانی تر (+5,000)</option>
        </select>
        <input type="text" id="cDistrict" placeholder="ناونیشان (گەڕەک، کۆڵان، نزیک شوێنێکی دیار)">
        <textarea id="cNote" placeholder="تێبینی بۆ گەیاندن (ئارەزوومەندانە)..." rows="2"></textarea>
        <div style="background:rgba(22, 163, 74, 0.1); padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid rgba(22, 163, 74, 0.2);">
            <div style="display:flex; justify-content:space-between; font-weight:bold; color:#16a34a; font-size:18px;">
                <span>کۆی گشتی پارە:</span><span><span id="final-total">0</span> IQD</span>
            </div>
        </div>
        <button onclick="submitOrder()" class="add-btn" style="background:#16a34a;">ناردنی داواکاری بۆ وەتسئەپ</button>
        <button onclick="closeModal('checkout-modal')" style="width:100%; border:none; background:none; color:red; margin-top:10px; cursor:pointer;">گەڕانەوە</button>
    </div>
</div>

<div id="admin-panel" class="modal">
    <div class="modal-content" style="max-width:500px;">
        <h3 style="margin-top:0;">بەڕێوەبردن 🛠️</h3>
        <div style="background:white; padding:15px; border-radius:15px; color:black; border:1px solid #ddd;">
            <h4 style="margin-top:0;">➕ زیادکردنی کاڵای نوێ</h4>
            <input id="pName" placeholder="ناوی کاڵا">
            <input id="pPrice" placeholder="نرخ (بەنیازی ژمارە)">
            <input id="pAge" placeholder="تەمەن (وەک: ٢-٤ ساڵ)">
            <input id="pStock" placeholder="ستۆک (وەک: تەنها ٣ دانە ماوە)">
            <input id="pColors" placeholder="ڕەنگەکان (بە کۆما جیاکراوە: سور, شین)">
            <input id="pSizes" placeholder="قەبارەکان (بە کۆما: M, L, XL)">
            <input id="pImage" placeholder="لینکی وێنەی کاڵا">
            <button onclick="saveProduct()" class="add-btn">بڵاوکردنەوە</button>
        </div>
        <div style="background:white; padding:15px; border-radius:15px; color:black; border:1px solid #ddd; margin-top:15px;">
            <h4 style="margin-top:0;">🖼️ وێنەی ڕیکلامی سەرەوە</h4>
            <input id="slideImage" placeholder="لینکی وێنەی نوێ بۆ سلایدەر">
            <button onclick="addSlide()" class="add-btn" style="background:green;">زیادکردنی وێنە</button>
        </div>
        <div style="margin-top:20px; color:black;">
            <h4>📦 لیست و سڕینەوەی کاڵاکان:</h4>
            <div id="admin-product-list"></div>
        </div>
        <button onclick="closeModal('admin-panel')" class="add-btn" style="background:red; margin-top:20px;">داخستن</button>
    </div>
</div>

<div id="toast" style="visibility:hidden; min-width:200px; background:#333; color:#fff; text-align:center; border-radius:12px; padding:14px; position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:10000; font-weight:bold;"></div>

<script>
    let allProds = JSON.parse(localStorage.getItem('products')) || [];
    let slides = JSON.parse(localStorage.getItem('slides')) || ["https://via.placeholder.com/800x400?text=بەخێربێن+بۆ+VIP+Baby"];
    let storeNumber = "9647700000000"; // ژمارەکەت لێرە دابنێ
    let cart = [];
    let selections = {};
    let currentSlide = 0;

    function toggleMode() { document.body.classList.toggle('dark-mode'); }
    function showToast(m) { let t=document.getElementById('toast'); t.innerText=m; t.style.visibility='visible'; setTimeout(()=>t.style.visibility='hidden', 2500); }
    function openModal(id) { document.getElementById(id).style.display='flex'; if(id==='admin-panel') renderAdminList(); }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function adminLogic() { let p = prompt("پاسۆردی ئادمین:"); if(p==="2024") openModal('admin-panel'); }

    // --- SLIDER ENGINE ---
    function renderSlider() {
        const s = document.getElementById('slider');
        const d = document.getElementById('dots');
        s.innerHTML = slides.map(img => `<img src="${img}">`).join('');
        d.innerHTML = slides.map((_, i) => `<div class="dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');
    }
    function goToSlide(n) {
        currentSlide = n;
        document.getElementById('slider').style.transform = `translateX(${n * 100}%)`;
        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === n));
    }
    setInterval(() => { if(slides.length > 1) { currentSlide = (currentSlide + 1) % slides.length; goToSlide(currentSlide); } }, 4500);

    function addSlide() {
        let url = document.getElementById('slideImage').value;
        if(url) { slides.push(url); localStorage.setItem('slides', JSON.stringify(slides)); renderSlider(); showToast("وێنەکە زیادکرا"); document.getElementById('slideImage').value=''; }
    }

    // --- PRODUCT ENGINE ---
    function saveProduct() {
        let n=document.getElementById('pName').value, p=document.getElementById('pPrice').value, st=document.getElementById('pStock').value, age=document.getElementById('pAge').value, img=document.getElementById('pImage').value;
        let clr=document.getElementById('pColors').value, sz=document.getElementById('pSizes').value;
        if(!n || !p) return alert("تکایە ناو و نرخ بنووسە");
        allProds.push({ id: Date.now(), name: n, price: parseInt(p), stock: st, age, colors: clr?clr.split(','):[], sizes: sz?sz.split(','):[], image: img||'https://via.placeholder.com/150'});
        localStorage.setItem('products', JSON.stringify(allProds));
        renderProducts(allProds); renderAdminList(); showToast("کاڵاکە زیادکرا ✅");
        ["pName","pPrice","pStock","pAge","pColors","pSizes","pImage"].forEach(id => document.getElementById(id).value='');
    }

    function deleteProduct(id) {
        if(confirm("دڵنیای لە سڕینەوە؟")) {
            allProds = allProds.filter(p => p.id !== id);
            localStorage.setItem('products', JSON.stringify(allProds));
            renderProducts(allProds); renderAdminList();
        }
    }

    function renderAdminList() {
        document.getElementById('admin-product-list').innerHTML = allProds.map(p => `
            <div class="admin-item"><span>${p.name}</span><button class="del-btn" onclick="deleteProduct(${p.id})">سڕینەوە</button></div>
        `).reverse().join('');
    }

    function renderProducts(prods) {
        document.getElementById('products-container').innerHTML = prods.map((p, idx) => `
            <div class="card">
                ${p.age ? `<div class="age-badge">${p.age}</div>` : ''}
                <img src="${p.image}">
                <span class="promo-timer">⏱️ ئۆفەری کاتیی!</span>
                <h4 style="margin:5px 0;">${p.name}</h4>
                ${p.stock ? `<div class="stock-tag">${p.stock}</div>` : ''}
                <div style="margin:8px 0;">
                    ${p.colors.map(c => `<span class="color-dot" style="background:${getColor(c.trim())}" onclick="selectOpt(${idx},'color','${c.trim()}',this)"></span>`).join('')}
                    <div style="margin-top:5px;">${p.sizes.map(s => `<span class="size-btn" onclick="selectOpt(${idx},'size','${s.trim()}',this)">${s.trim()}</span>`).join('')}</div>
                </div>
                <div style="color:#16a34a; font-weight:bold; font-size:16px;">${p.price.toLocaleString()} IQD</div>
                <button class="add-btn" onclick="addToCart(${idx})">زیادکردن بۆ سەبەتە</button>
            </div>
        `).join('');
    }

    function getColor(c) {
        let d = {"سور":"red","شین":"blue","سپی":"white","ڕەش":"black","سەوز":"green","پەمەیی":"pink","زەرد":"yellow","بۆری":"gray"};
        return d[c] || c;
    }

    function selectOpt(idx, type, val, el) {
        if(!selections[idx]) selections[idx] = {}; selections[idx][type] = val;
        el.parentElement.querySelectorAll(type==='color'?'.color-dot':'.size-btn').forEach(s => s.classList.remove('selected-opt','selected-size'));
        el.classList.add(type==='color'?'selected-opt':'selected-size');
    }

    function addToCart(idx) {
        let p = allProds[idx], sel = selections[idx] || {};
        if(p.colors.length > 0 && !sel.color) return showToast("تکایە ڕەنگ هەڵبژێرە");
        if(p.sizes.length > 0 && !sel.size) return showToast("تکایە قەبارە هەڵبژێرە");
        cart.push({name: p.name, price: p.price, color: sel.color||'', size: sel.size||'', age: p.age||''});
        document.getElementById('cart-count').innerText = cart.length;
        showToast("زیادکرا 🛒"); updateCartUI();
    }

    function updateCartUI() {
        document.getElementById('cart-items').innerHTML = cart.map(i => `
            <div style="padding:10px; border-bottom:1px solid #eee; font-size:14px;">
                <b>${i.name}</b> <small>(${i.age})</small><br>
                <span>ڕەنگ: ${i.color} | قەبارە: ${i.size}</span>
            </div>
        `).join('');
    }

    function updateCheckoutTotal() {
        let sub = cart.reduce((s, i) => s + i.price, 0), del = parseInt(document.getElementById('cCity').value) || 0;
        document.getElementById('final-total').innerText = (sub + del).toLocaleString();
    }

    function openCheckout() { if(cart.length===0) return showToast("سەبەتە خاڵییە"); closeModal('cart-modal'); openModal('checkout-modal'); updateCheckoutTotal(); }

    function submitOrder() {
        let n=document.getElementById('cName').value, ph=document.getElementById('cPhone').value, city=document.getElementById('cCity').options[document.getElementById('cCity').selectedIndex].text, dist=document.getElementById('cDistrict').value;
        if(!n || !ph || dist==="") return showToast("تکایە هەموو خانەکان پڕبکەرەوە");
        let items = cart.map(i => `- ${i.name} (${i.age}) [${i.color} / ${i.size}]`).join('\n');
        let msg = `داواکاری نوێ لە VIP Baby 🛒\n\nناو: ${n}\nمۆبایل: ${ph}\nشار: ${city}\nناونیشان: ${dist}\n\nکاڵاکان:\n${items}\n\nکۆی گشتی: ${document.getElementById('final-total').innerText} IQD`;
        window.open(`https://wa.me/${storeNumber}?text=${encodeURIComponent(msg)}`);
    }

    function filterProds() {
        let t = document.getElementById('searchInput').value.toLowerCase();
        renderProducts(allProds.filter(p => p.name.toLowerCase().includes(t) || (p.age && p.age.toLowerCase().includes(t))));
    }

    renderSlider(); renderProducts(allProds);
    document.getElementById('wa-link').href = `https://wa.me/${storeNumber}`;
</script>
</body>
</html>
