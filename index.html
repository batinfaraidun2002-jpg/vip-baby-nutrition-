<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Baby Store - Official</title>
    <style>
        :root { --main: #1e293b; --accent: #f59e0b; --bg: #f8fafc; --text: #334155; }
        body { font-family: Tahoma, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; }
        
        .header { background: var(--main); color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .nav-row { display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px; }
        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .search-bar { width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; outline: none; font-family: inherit; font-size: 14px; transition: 0.3s; }

        .page { display: none; padding: 20px; background: white; margin: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .active-page { display: block; }
        .menu-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; position: relative; border: 1px solid #e2e8f0; transition: 0.2s; }
        .card img { width: 100%; height: 130px; object-fit: contain; }
        .card h4 { margin: 10px 0 5px 0; font-size: 16px; }
        .card .price { color: #16a34a; font-weight: 700; }
        
        .add-btn { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 10px; }
        
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-section { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 20px; background: white; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 420px; text-align: right; }
        
        .chat-box { height: 250px; overflow-y: auto; border: 1px solid #e2e8f0; background: #f8fafc; padding: 15px; margin-bottom: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .msg.admin { background: var(--main); color: white; align-self: flex-start; }
        .msg.user { background: #e2e8f0; color: #0f172a; align-self: flex-end; }
        
        #toast { visibility: hidden; min-width: 200px; background-color: #1e293b; color: white; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        .admin-prod-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-row">
        <button class="menu-btn" onclick="openModal('menu-modal')">☰</button>
        <div class="logo-container" onclick="adminLogic()">
            <img src="https://i.postimg.cc/RWNMnJDG/image.jpg" class="logo">
            <h2 style="margin:0; font-size: 18px;">VIP Baby</h2>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <div onclick="openModal('chat-modal')" style="cursor:pointer; font-size: 22px; position:relative;">
                💬 <span id="chat-dot" style="display:none; position:absolute; top:-2px; right:-2px; background:red; width:8px; height:8px; border-radius:50%;"></span>
            </div>
            <div onclick="openModal('cart-modal')" style="cursor:pointer; font-size: 22px; position:relative;">
                🛒 <span id="cart-count" style="position:absolute; top:-6px; right:-10px; background:#ef4444; color:white; border-radius:50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size:11px;">0</span>
            </div>
        </div>
    </div>
</div>

<div id="p-home" class="page active-page" style="background:transparent; box-shadow:none; padding:0;">
    <div class="product-grid" id="products-container"></div>
</div>

<div id="toast"></div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h3>کۆنترۆڵی ئادمین 🛠️</h3>
        <button onclick="closeAdmin()" style="padding:10px; background:red; color:white; border:none; border-radius:8px;">دەرچوون</button>
    </div>

    <div class="admin-section">
        <h4>📦 زیادکردنی بەرهەم:</h4>
        <input id="pName" placeholder="ناوی بەرهەم">
        <input id="pPrice" placeholder="نرخی کۆتایی">
        <input id="pImage" placeholder="لینکی وێنە">
        <button onclick="saveProduct()" class="add-btn" style="background:green;">بڵاوکردنەوە</button>
    </div>

    <div class="admin-section">
        <h4>🗑️ لیستی بەرهەمەکان:</h4>
        <div id="admin-prods-list"></div>
    </div>

    <div class="admin-section">
        <h4>💬 نامەکان:</h4>
        <div id="admin-chat-box" class="chat-box"></div>
        <input id="adminMsg" placeholder="وەڵام بنووسە..." onkeypress="if(event.key==='Enter') sendMsg('admin')">
        <button onclick="sendMsg('admin')" class="add-btn">ناردن</button>
    </div>
</div>

<div id="admin-login-modal" class="modal">
    <div class="modal-content" style="text-align:center;">
        <h3>🔒 چوونەژوورەوە</h3>
        <input type="password" id="adminPassInput" placeholder="پاسۆرد">
        <button onclick="verifyAdmin()" class="add-btn">دخول</button>
    </div>
</div>

<div id="chat-modal" class="modal">
    <div class="modal-content">
        <h3>💬 نامە بنێرە</h3>
        <div id="user-chat-box" class="chat-box"></div>
        <input id="userMsg" placeholder="شتێک بنووسە..." onkeypress="if(event.key==='Enter') sendMsg('user')">
        <button onclick="sendMsg('user')" class="add-btn">ناردن</button>
        <button onclick="closeModal('chat-modal')" style="width:100%; border:none; background:none; color:red; margin-top:10px;">داخستن</button>
    </div>
</div>

<div id="cart-modal" class="modal"><div class="modal-content"><h3>🛒 سەبەتە</h3><div id="cart-items"></div><button onclick="closeModal('cart-modal')" class="add-btn">داخستن</button></div></div>
<div id="menu-modal" class="modal"><div class="modal-content"><h3>مینیۆ</h3><button onclick="location.reload()" class="add-btn">🏠 سەرەکی</button></div></div>

<script>
    let allProds = JSON.parse(localStorage.getItem('products')) || [];
    let chats = JSON.parse(localStorage.getItem('chats')) || [];
    let cart = [];

    // --- نۆتیفیکەیشنی دەنگی ---
    const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    function playNotify() {
        notifySound.play().catch(e => console.log("Sound blocked by browser"));
    }

    function showToast(m) { 
        let t = document.getElementById("toast"); 
        t.innerText = m; t.className = "show"; 
        setTimeout(() => t.className = "", 3000); 
    }

    function openModal(id) { 
        document.getElementById(id).style.display='flex'; 
        if(id === 'chat-modal') document.getElementById('chat-dot').style.display = 'none';
    }
    
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }

    let count = 0;
    function adminLogic() { count++; if(count >= 3) { openModal('admin-login-modal'); count = 0; } setTimeout(()=>count=0, 2000); }

    function verifyAdmin() {
        if(document.getElementById('adminPassInput').value === "20242024") {
            closeModal('admin-login-modal');
            document.getElementById('admin-panel').style.display='block';
            renderAdminProds(); renderChats();
        } else { showToast("هەڵەیە!"); }
    }

    function renderProducts(prods) {
        document.getElementById('products-container').innerHTML = prods.map(p => `
            <div class="card">
                <img src="${p.image}">
                <h4>${p.name}</h4>
                <div class="price">${p.price} IQD</div>
                <button class="add-btn" onclick="addToCart('${p.name}')">کڕین</button>
            </div>
        `).join("");
    }

    function renderAdminProds() {
        document.getElementById('admin-prods-list').innerHTML = allProds.map((p, i) => `
            <div class="admin-prod-item">
                <span>${p.name}</span>
                <button onclick="deleteProd(${i})" style="color:red; border:none; background:none; cursor:pointer;">سڕینەوە 🗑️</button>
            </div>
        `).join("");
    }

    function saveProduct() {
        const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, img = document.getElementById('pImage').value;
        if(n && p && img) {
            allProds.push({name:n, price:p, image:img});
            localStorage.setItem('products', JSON.stringify(allProds));
            renderProducts(allProds); renderAdminProds(); showToast("بەرهەم زیاد کرا!");
        }
    }

    function deleteProd(i) {
        allProds.splice(i, 1);
        localStorage.setItem('products', JSON.stringify(allProds));
        renderProducts(allProds); renderAdminProds();
    }

    function sendMsg(sender) {
        const id = sender === 'admin' ? 'adminMsg' : 'userMsg';
        const msg = document.getElementById(id).value.trim();
        if(msg) {
            chats.push({sender, text: msg});
            localStorage.setItem('chats', JSON.stringify(chats));
            document.getElementById(id).value = '';
            renderChats();
            
            // ئەگەر کڕیار نامەی نارد، نۆتیفیکەیشن بۆ ئادمین بچێت
            if(sender === 'user') {
                playNotify();
                document.getElementById('chat-dot').style.display = 'block';
                showToast("نامەکەت گەیشت 📩");
            }
        }
    }

    function renderChats() {
        const html = chats.map(m => `<div class="msg ${m.sender}">${m.text}</div>`).join("");
        if(document.getElementById('user-chat-box')) document.getElementById('user-chat-box').innerHTML = html;
        if(document.getElementById('admin-chat-box')) {
            document.getElementById('admin-chat-box').innerHTML = html;
            document.getElementById('admin-chat-box').scrollTop = document.getElementById('admin-chat-box').scrollHeight;
        }
    }

    function addToCart(n) { 
        cart.push(n); 
        document.getElementById('cart-count').innerText = cart.length; 
        showToast("خرایە سەبەتە 🛒"); 
        playNotify(); // دەنگ کاتێک کڕین دەکرێت
    }

    renderProducts(allProds);
    renderChats();
</script>
</body>
</html>
