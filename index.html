<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Baby Store - Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { 
            --main: #1e293b; 
            --accent: #f59e0b; 
            --bg: #f8fafc; 
            --text: #334155; 
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --input-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg: #0f172a;
            --text: #f8fafc;
            --card-bg: #1e293b;
            --border: #334155;
            --input-bg: #334155;
        }

        body { font-family: Tahoma, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; transition: 0.3s; }
        
        .header { background: var(--main); color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .nav-row { display: flex; justify-content: space-between; align-items: center; }
        .logo-container { display: flex; align-items: center; gap: 10px; padding: 5px; }
        .logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; cursor: pointer; }
        .search-bar { width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); box-sizing: border-box; outline: none; font-family: inherit; font-size: 14px; transition: 0.3s; background: var(--input-bg); color: var(--text); }

        .page { display: none; padding: 20px; background: var(--card-bg); margin: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .active-page { display: block; }
        .menu-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; position: relative; border: 1px solid var(--border); }
        
        .media-scroller { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 10px; scroll-snap-type: x mandatory; border-radius: 8px; }
        .media-item { flex: 0 0 100%; }
        .media-item img, .media-item video { width: 100%; height: 130px; object-fit: contain; background: var(--bg); }

        .add-btn { background: var(--main); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .add-btn.action { background: var(--accent); color: #0f172a; }

        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .admin-section { border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; background: var(--card-bg); }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 16px; width: 90%; max-width: 420px; max-height: 90vh; overflow-y: auto; }

        .chat-box { height: 250px; overflow-y: auto; border: 1px solid var(--border); background: var(--bg); padding: 15px; margin-bottom: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 80%; }
        .msg.admin { background: var(--main); color: white; align-self: flex-start; }
        .msg.user { background: #e2e8f0; color: black; align-self: flex-end; }
        
        .discount-badge { position: absolute; top: 12px; right: 12px; background: #ef4444; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; z-index: 10; }
        #toast { visibility: hidden; min-width: 250px; background-color: var(--main); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; }

        .cat-pill { padding: 8px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .cat-pill.active { background: var(--main); color: white; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-row">
        <button class="menu-btn" onclick="openModal('menu-modal')">☰</button>
        <div class="logo-container">
            <img src="https://i.postimg.cc/RWNMnJDG/image.jpg" class="logo" onclick="adminLogic()">
            <h2 style="margin:0; font-size: 18px; font-weight: 700;">VIP Baby</h2>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <div onclick="toggleTheme()" id="themeToggleBtn" style="cursor:pointer; font-size: 20px;">🌙</div>
            <select id="langSelector" style="width: auto; margin:0;" onchange="changeLang(this.value)">
                <option value="ku">KU</option>
                <option value="ar">AR</option>
                <option value="en">EN</option>
            </select>
            <div onclick="openUserChat()" style="cursor:pointer; font-size: 22px;">💬</div>
            <div onclick="openModal('cart-modal')" style="cursor:pointer; font-size: 22px; position:relative;">
                🛒 <span id="cart-count" style="position:absolute; top:-6px; right:-10px; background:#ef4444; color:white; border-radius:50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size:11px;">0</span>
            </div>
        </div>
    </div>
    <input type="text" id="searchInput" class="search-bar" placeholder="گەڕان..." onkeyup="filterProds()">
</div>

<div id="p-home" class="page active-page" style="background:transparent; box-shadow:none; padding:0;">
    <div id="category-filters" class="media-scroller" style="padding: 15px; gap: 10px;"></div>
    <div class="product-grid" id="products-container"></div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h3>کۆنترۆڵی ئادمین 🛠️</h3>
        <button onclick="closeAdmin()" style="background:#ef4444; color:white; border:none; padding:10px; border-radius:8px;">دەرچوون</button>
    </div>
    <div class="admin-section">
        <h4>📦 زیادکردنی بەرهەم:</h4>
        <input id="pName" placeholder="ناوی بەرهەم">
        <input id="pPrice" type="number" placeholder="نرخی کۆتایی">
        <input id="pOldPrice" placeholder="نرخی پێشوو (بۆ داشکاندن)">
        <input id="pImage" placeholder="لینکی وێنەی سەرەکی">
        <select id="pCategory"></select>
        <button onclick="saveProduct()" class="add-btn" style="background:#16a34a;">بڵاوکردنەوە</button>
    </div>
    <div class="admin-section">
        <h4>📁 بەڕێوەبردنی پۆلێنەکان:</h4>
        <input id="newCatInput" placeholder="ناوی پۆلێن">
        <button onclick="addCategory()" class="add-btn">زیادکردن</button>
    </div>
    <div class="admin-section" id="admin-products-list"></div>
</div>

<div id="cart-modal" class="modal"><div class="modal-content"><h3 id="t-cart">🛒 سەبەتەی کڕین</h3><div id="cart-items"></div><button onclick="openCheckout()" class="add-btn action">تەواوکردنی داواکاری</button><button onclick="closeModal('cart-modal')" class="add-btn" style="background:gray;">داخستن</button></div></div>
<div id="admin-login-modal" class="modal"><div class="modal-content"><h3>🔒 کۆد بنووسە</h3><input type="password" id="adminPassInput"><button onclick="verifyAdmin()" class="add-btn">چوونەژوورەوە</button></div></div>
<div id="chat-modal" class="modal"><div class="modal-content"><h3>💬 چات لەگەڵ وەڵامدەر</h3><div id="user-chat-box" class="chat-box"></div><input id="userMsg" placeholder="نامە بنووسە..."><button onclick="sendMsg()" class="add-btn">ناردن</button><button onclick="closeModal('chat-modal')" class="add-btn" style="background:gray;">داخستن</button></div></div>

<div id="toast"></div>

<script>
    // --- لۆجیکی سەرەکی ---
    let allProds = JSON.parse(localStorage.getItem('products')) || [];
    let categories = JSON.parse(localStorage.getItem('categories')) || ["گشتی"];
    let cart = [];
    let currentLang = 'ku';
    let adminPass = "20242024";

    const dict = {
        ku: { buy: "کڕین", search: "گەڕان بۆ بەرهەمەکان..." },
        ar: { buy: "شراء", search: "البحث عن المنتجات..." },
        en: { buy: "Buy", search: "Search products..." }
    };

    function renderProducts(prods) {
        const container = document.getElementById('products-container');
        container.innerHTML = '';
        prods.forEach((p, index) => {
            container.innerHTML += `
                <div class="card">
                    ${p.oldPrice ? `<div class="discount-badge">داشکاندن</div>` : ''}
                    <div class="media-item"><img src="${p.img}"></div>
                    <h4>${p.name}</h4>
                    <p style="color:green; font-weight:bold;">${p.price} IQD</p>
                    <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">${dict[currentLang].buy}</button>
                </div>`;
        });
    }

    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        showToast("زیادکرا بۆ سەبەتە ✅");
    }

    function showToast(m) {
        let t = document.getElementById('toast'); t.innerText = m; t.className = "show";
        setTimeout(() => t.className = "", 3000);
    }

    function adminLogic() {
        let c = window.adminClicks || 0; c++; window.adminClicks = c;
        if(c >= 3) { openModal('admin-login-modal'); window.adminClicks = 0; }
        setTimeout(() => window.adminClicks = 0, 2000);
    }

    function verifyAdmin() {
        if(document.getElementById('adminPassInput').value === adminPass) {
            closeModal('admin-login-modal');
            document.getElementById('admin-panel').style.display = 'block';
            renderAdminCats();
        } else { alert("کۆد هەڵەیە"); }
    }

    function saveProduct() {
        let p = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            oldPrice: document.getElementById('pOldPrice').value,
            img: document.getElementById('pImage').value,
            cat: document.getElementById('pCategory').value
        };
        allProds.push(p);
        localStorage.setItem('products', JSON.stringify(allProds));
        renderProducts(allProds);
        showToast("بڵاوکرایەوە 🚀");
    }

    function addCategory() {
        let val = document.getElementById('newCatInput').value;
        if(val) { 
            categories.push(val); 
            localStorage.setItem('categories', JSON.stringify(categories)); 
            renderAdminCats();
        }
    }

    function renderAdminCats() {
        let sel = document.getElementById('pCategory');
        let fil = document.getElementById('category-filters');
        sel.innerHTML = ''; fil.innerHTML = '';
        categories.forEach(c => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
            fil.innerHTML += `<div class="cat-pill" onclick="filterByCat('${c}')">${c}</div>`;
        });
    }

    function filterByCat(c) {
        let filtered = (c === 'گشتی') ? allProds : allProds.filter(p => p.cat === c);
        renderProducts(filtered);
    }

    function openCheckout() {
        let text = "سڵاو، داواکاریم هەیە:\n";
        cart.forEach(i => text += `- ${i.name} (${i.price} IQD)\n`);
        window.open(`https://wa.me/9647500000000?text=${encodeURIComponent(text)}`);
    }

    function toggleTheme() {
        let b = document.body;
        let t = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        b.setAttribute('data-theme', t);
        document.getElementById('themeToggleBtn').innerText = t === 'dark' ? '☀️' : '🌙';
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    window.onload = () => {
        renderProducts(allProds);
        renderAdminCats();
    };
</script>
</body>
</html>
