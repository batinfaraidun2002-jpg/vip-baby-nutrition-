<script>
// ================== BASIC ==================
function showToast(message) {
    let toast = document.getElementById("toast");
    toast.innerText = message;
    toast.className = "show";
    setTimeout(() => toast.className = "", 3000);
}

let allProds = JSON.parse(localStorage.getItem('products')) || [];
let cart = [];

// ================== PRODUCTS ==================
function renderProducts(prods) {
    document.getElementById('products-container').innerHTML = prods.map((p, index) => {

        let priceHtml = `<div class="price">${p.price} IQD</div>`;
        let badgeHtml = '';

        if(p.oldPrice && p.oldPrice.trim() !== '') {
            badgeHtml = `<div class="discount-badge">% OFF</div>`;
            priceHtml = `
                <div class="price-container">
                    <span class="price">${p.price} IQD</span>
                    <span class="old-price">${p.oldPrice}</span>
                </div>
            `;
        } else {
            priceHtml = `<div class="price-container"><span class="price">${p.price} IQD</span></div>`;
        }

        // 🔒 admin buttons
        let adminBtns = '';
        if(document.getElementById('admin-panel').style.display === 'block') {
            adminBtns = `
                <div style="display:flex; gap:5px; margin-bottom:8px;">
                    <button onclick="editProduct(${index})"
                    style="background:#2563eb;color:white;border:none;padding:6px;border-radius:6px;">✏️</button>

                    <button onclick="deleteProduct(${index})"
                    style="background:#ef4444;color:white;border:none;padding:6px;border-radius:6px;">❌</button>
                </div>
            `;
        }

        return `
        <div class="card">
            ${badgeHtml}
            ${adminBtns}
            <img src="${p.image}" alt="">
            <h4>${p.name}</h4>
            <p class="desc">${p.desc || ''}</p>
            ${priceHtml}
            <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">
                Add to Cart
            </button>
        </div>
        `;
    }).join("");
}

// ================== ADD PRODUCT ==================
function saveProduct() {
    const n = document.getElementById('pName').value;
    const d = document.getElementById('pDesc').value;
    const op = document.getElementById('pOldPrice').value;
    const p = document.getElementById('pPrice').value;
    let img = document.getElementById('pImage').value;

    if(!img) img = "https://via.placeholder.com/150";
    if(!n || !p) return showToast("Fill all fields");

    allProds.push({name:n, desc:d, oldPrice:op, price:p, image:img});
    localStorage.setItem('products', JSON.stringify(allProds));

    renderProducts(allProds);
    showToast("Added ✔️");
}

// ================== EDIT ==================
function editProduct(index) {
    let p = allProds[index];

    let newName = prompt("Name:", p.name);
    if(!newName) return;

    let newPrice = prompt("Price:", p.price);
    if(!newPrice) return;

    let newDesc = prompt("Description:", p.desc || "");
    let newImg = prompt("Image link:", p.image);

    allProds[index] = {
        name: newName,
        price: newPrice,
        desc: newDesc,
        image: newImg,
        oldPrice: p.oldPrice
    };

    localStorage.setItem('products', JSON.stringify(allProds));
    renderProducts(allProds);

    showToast("Updated ✏️");
}

// ================== DELETE ==================
function deleteProduct(index) {
    if(confirm("Delete this product?")) {
        allProds.splice(index, 1);
        localStorage.setItem('products', JSON.stringify(allProds));
        renderProducts(allProds);
        showToast("Deleted ❌");
    }
}

// ================== CART ==================
function addToCart(n, p) {
    cart.push({n, p});
    document.getElementById('cart-count').innerText = cart.length;
    showToast("Added to cart 🛒");
}

// ================== INIT ==================
renderProducts(allProds);

</script>
